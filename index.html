# UGod — Mobile AI Civilization Demo V2.0

```html
<!DOCTYPE html>
<html lang="en">
<head>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
overflow:hidden;
background:#040816;
color:white;
}

#game{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top,#132544 0%,#050913 75%);
}

#world{
position:absolute;
inset:0;
background-image:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg');
background-size:cover;
background-position:center;
opacity:0.18;
filter:brightness(1.5);
}

#fog{
position:absolute;
inset:0;
background:
radial-gradient(circle at center,transparent 0%,rgba(0,0,0,0.2) 60%,rgba(0,0,0,0.75) 100%);
}

#grid{
position:absolute;
inset:0;
background:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
background-size:50px 50px;
}

.topBar{
position:absolute;
top:0;
left:0;
width:100%;
padding:14px;
z-index:100;
background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);
}

.logo{
font-size:30px;
font-weight:800;
letter-spacing:2px;
color:#7fd7ff;
}

.subtitle{
font-size:12px;
opacity:0.7;
margin-top:3px;
}

#yearLine{
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

#year{
font-size:26px;
font-weight:700;
}

#era{
font-size:11px;
opacity:0.7;
}

#actions{
position:absolute;
right:8px;
top:110px;
width:80px;
z-index:200;
display:flex;
flex-direction:column;
gap:10px;
}

.action{
height:78px;
border:none;
border-radius:22px;
background:rgba(10,20,40,0.92);
backdrop-filter:blur(12px);
color:white;
font-size:11px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.action:active{
transform:scale(0.94);
}

.country{
position:absolute;
border-radius:50%;
transform:translate(-50%,-50%);
transition:all 2s ease;
opacity:0.92;
box-shadow:0 0 25px rgba(255,255,255,0.18);
}

.countryLabel{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:10px;
font-weight:700;
text-shadow:0 0 10px black;
}

.icon{
position:absolute;
font-size:18px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px);} 
50%{transform:translateY(-5px);} 
100%{transform:translateY(0px);} 
}

#bottom{
position:absolute;
bottom:0;
left:0;
width:100%;
height:250px;
background:rgba(0,0,0,0.62);
backdrop-filter:blur(14px);
border-top-left-radius:28px;
border-top-right-radius:28px;
z-index:150;
overflow:hidden;
}

#stats{
display:flex;
justify-content:space-around;
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.06);
}

.stat h2{
font-size:18px;
color:#7fd7ff;
text-align:center;
}

.stat p{
font-size:10px;
opacity:0.7;
text-align:center;
}

#feed{
height:170px;
overflow-y:auto;
padding:12px;
}

.event{
background:rgba(255,255,255,0.04);
padding:12px;
border-radius:18px;
margin-bottom:10px;
border-left:4px solid #7fd7ff;
animation:appear 0.4s ease;
}

.event h4{
font-size:14px;
margin-bottom:5px;
color:#7fd7ff;
}

.event p{
font-size:12px;
line-height:1.45;
opacity:0.88;
}

#modal{
position:absolute;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
align-items:flex-end;
z-index:400;
}

#modalBox{
width:100%;
background:#08111d;
padding:20px;
border-top-left-radius:28px;
border-top-right-radius:28px;
animation:slideUp 0.35s ease;
}

#leaderName{
font-size:22px;
font-weight:700;
color:#7fd7ff;
}

#leaderRole{
margin-top:4px;
font-size:12px;
opacity:0.7;
}

#leaderText{
margin-top:14px;
line-height:1.6;
font-size:14px;
opacity:0.92;
margin-bottom:18px;
}

.choice{
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:#12243b;
margin-bottom:10px;
color:white;
text-align:left;
font-size:14px;
}

.closeBtn{
background:#30131a;
}

@keyframes slideUp{
from{transform:translateY(100%);} 
to{transform:translateY(0);} 
}

@keyframes appear{
from{opacity:0;transform:translateY(20px);} 
to{opacity:1;transform:translateY(0);} 
}

</style>
</head>
<body>

<div id="game">

<div id="world"></div>
<div id="grid"></div>
<div id="fog"></div>

<div class="topBar">
<div class="logo">UGod</div>
<div class="subtitle">AI CIVILIZATION EVOLUTION ENGINE</div>

<div id="yearLine">
<div id="year">YEAR 2140</div>
<div id="era">ERA OF AWAKENING</div>
</div>
</div>

<div id="actions">
<button class="action" onclick="divineAction('faith')">✨<br>Faith</button>
<button class="action" onclick="divineAction('technology')">🧠<br>Tech</button>
<button class="action" onclick="divineAction('chaos')">⚠<br>Chaos</button>
<button class="action" onclick="divineAction('prosperity')">🌱<br>Growth</button>
<button class="action" onclick="divineAction('signal')">📡<br>Signal</button>
</div>

<div id="bottom">
<div id="stats">
<div class="stat"><h2 id="pop">84M</h2><p>Population</p></div>
<div class="stat"><h2 id="rel">4</h2><p>Religions</p></div>
<div class="stat"><h2 id="stab">71%</h2><p>Stability</p></div>
<div class="stat"><h2 id="aware">2%</h2><p>Awareness</p></div>
</div>

<div id="feed"></div>
</div>

<div id="modal">
<div id="modalBox">
<div id="leaderName"></div>
<div id="leaderRole"></div>
<div id="leaderText"></div>

<button class="choice" onclick="leaderResponse('support')">✨ Support this civilization spiritually</button>
<button class="choice" onclick="leaderResponse('knowledge')">🧠 Reveal forbidden knowledge</button>
<button class="choice" onclick="leaderResponse('war')">⚔ Encourage conflict and expansion</button>
<button class="choice" onclick="leaderResponse('observe')">🌑 Observe silently</button>
<button class="choice closeBtn" onclick="closeModal()">Close</button>
</div>
</div>

</div>

<script>

let year=2140;
let population=84;
let religions=4;
let stability=71;
let awareness=2;

const feed=document.getElementById('feed');
const game=document.getElementById('game');

const countries=[
{
name:'Atlantic Union',
leader:'President Kael',
role:'Technocratic Federation',
color:'#3ba7ff',
x:25,
y:35,
size:70,
stability:80,
tech:65,
faith:25,
icons:['🧠']
},
{
name:'Solar Empire',
leader:'Emperor Vaelor',
role:'Expansionist Empire',
color:'#ff8b3d',
x:50,
y:38,
size:85,
stability:60,
tech:45,
faith:70,
icons:['⚔']
},
{
name:'Eastern Nexus',
leader:'Scientist Elyra',
role:'Scientific Coalition',
color:'#59ffb2',
x:68,
y:42,
size:75,
stability:75,
tech:90,
faith:15,
icons:['📡']
},
{
name:'Southern Tribes',
leader:'High Prophet Neth',
role:'Spiritual Confederation',
color:'#d56eff',
x:52,
y:60,
size:60,
stability:55,
tech:25,
faith:92,
icons:['⛪']
}
];

function renderCountries(){

 document.querySelectorAll('.country').forEach(el=>el.remove());

 countries.forEach((c,index)=>{

 const div=document.createElement('div');
 div.className='country';
 div.style.left=c.x+'vw';
 div.style.top=c.y+'vh';
 div.style.width=c.size+'px';
 div.style.height=c.size+'px';
 div.style.background=c.color;

 div.onclick=()=>openLeader(index);

 let iconsHTML='';

 c.icons.forEach((ic,i)=>{
 iconsHTML += `<div class="icon" style="left:${10+(i*18)}px;top:-12px">${ic}</div>`;
 });

 div.innerHTML=`
 <div class="countryLabel">${c.name}</div>
 ${iconsHTML}
 `;

 game.appendChild(div);

 });
}

function addEvent(title,text){

const div=document.createElement('div');
div.className='event';

div.innerHTML=`
<h4>${title}</h4>
<p>${text}</p>
`;

feed.prepend(div);
}

function openLeader(index){

const c=countries[index];

window.currentCountry=index;

document.getElementById('modal').style.display='flex';
document.getElementById('leaderName').innerText=c.leader;
document.getElementById('leaderRole').innerText=c.role;
document.getElementById('leaderText').innerText=
`${c.name} is evolving rapidly. Stability: ${c.stability}%. Technology: ${c.tech}%. Faith: ${c.faith}%. The population looks to you for guidance.`;
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function leaderResponse(type){

const c=countries[currentCountry];

if(type==='support'){
c.faith += 12;
c.stability += 6;
c.icons.push('✨');

addEvent(
`${c.name} experiences spiritual awakening`,
`Religious unity spreads through the nation. Pilgrimages and sacred rituals emerge.`
);
}

if(type==='knowledge'){
c.tech += 15;
c.size += 6;
c.icons.push('🧠');
awareness += 3;

addEvent(
`${c.name} enters scientific renaissance`,
`Advanced technologies reshape society as researchers uncover impossible cosmic patterns.`
);
}

if(type==='war'){
c.size += 12;
c.stability -= 12;
c.icons.push('⚔');

addEvent(
`${c.name} launches expansion campaigns`,
`Military forces invade neighboring territories while unrest grows internally.`
);
}

if(type==='observe'){

c.stability += 3;

addEvent(
`The Silent Era affects ${c.name}`,
`Without divine intervention, philosophers debate the meaning of existence.`
);
}

updateStats();
renderCountries();
closeModal();
}

function divineAction(type){

const target=countries[Math.floor(Math.random()*countries.length)];

if(type==='faith'){

target.faith += 15;
religions++;

target.icons.push('⛪');

addEvent(
`New Faith Emerges in ${target.name}`,
`Massive temples rise across the territory after celestial visions spread through the population.`
);
}

if(type==='technology'){

target.tech += 20;
awareness += 5;
target.size += 8;

target.icons.push('🧠');

addEvent(
`Technological Leap in ${target.name}`,
`Scientists achieve impossible breakthroughs and begin questioning the nature of reality.`
);
}

if(type==='chaos'){

target.stability -= 15;
stability -= 5;

target.icons.push('☄');

addEvent(
`Chaos spreads through ${target.name}`,
`Economic collapse and riots destabilize the government after catastrophic anomalies.`
);
}

if(type==='prosperity'){

target.size += 15;
population += 8;

target.icons.push('🌱');

addEvent(
`${target.name} enters golden age`,
`Trade routes expand and prosperity transforms the region into a global power.`
);
}

if(type==='signal'){

awareness += 8;

target.icons.push('📡');

addEvent(
`Cosmic Signal detected in ${target.name}`,
`Researchers discover repeating mathematical structures hidden within the universe.`
);
}

updateStats();
renderCountries();
}

function updateStats(){

document.getElementById('pop').innerText=population+'M';
document.getElementById('rel').innerText=religions;
document.getElementById('stab').innerText=stability+'%';
document.getElementById('aware').innerText=awareness+'%';
}

function evolveWorld(){

year += 1;
document.getElementById('year').innerText='YEAR '+year;

countries.forEach(c=>{

c.size += Math.random()*4-1.5;
c.stability += Math.random()*4-2;

if(c.stability<35 && Math.random()>0.7){

c.size -= 8;

addEvent(
`${c.name} begins collapsing`,
`Internal instability fragments the nation into competing factions.`
);

c.icons.push('🔥');
}

if(c.tech>85 && Math.random()>0.75){

addEvent(
`${c.name} develops synthetic intelligence`,
`New autonomous entities emerge inside the civilization.`
);

c.icons.push('🤖');
}

if(c.faith>90 && Math.random()>0.7){

addEvent(
`${c.name} becomes theocracy`,
`Religious leaders now dominate political and scientific institutions.`
);

c.icons.push('👁');
}

if(c.size<45){
c.size=45;
}

if(c.size>140){
c.size=140;
}

});

population += Math.floor(Math.random()*5);

renderCountries();
updateStats();
}

renderCountries();

addEvent(
'Civilization Initialized',
'The first AI civilizations awaken. Primitive nations begin forming philosophies and religions.'
);

setInterval(evolveWorld,4500);

</script>

</body>
</html>
